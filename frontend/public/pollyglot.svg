<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tailGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="60%" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="headGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0fdf4" stop-opacity="1"/>
      <stop offset="40%" stop-color="#4ade80" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Comet tail -->
  <path d="M2,2 Q20,18 34,34 Q20,20 2,2" fill="url(#tailGradient)" filter="url(#glow)" transform="rotate(0 24 24)"/>
  <path d="M4,6 Q18,18 32,32 Q18,22 4,6" fill="url(#tailGradient)" opacity="0.7" filter="url(#glow)"/>
  <!-- Comet head -->
  <circle cx="36" cy="36" r="10" fill="url(#headGradient)" filter="url(#glow)"/>
  <circle cx="36" cy="36" r="5" fill="#f0fdf4" opacity="0.9"/>
</svg>
